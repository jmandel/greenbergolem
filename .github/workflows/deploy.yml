name: Build and deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build viewer
        run: bun build viewer/index.html --outdir viewer/dist --target browser --minify --sourcemap

      - name: Copy data bundles into dist
        run: |
          cp viewer/public/index.json viewer/dist/
          cp viewer/public/bundle.json viewer/dist/
          cp viewer/public/bundle-greenberg-ibm.json viewer/dist/
          ls -la viewer/dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
